services:
  app:
    build:
      context: .
      target: api
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_PATH: /data/de-butler.sqlite
      UPLOAD_ROOT: /uploads
    volumes:
      - db_data:/data
      - upload_data:/uploads
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      target: web
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  db_data:
  upload_data:
