  <path d="M120 170 L120 185 L180 185" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <text x="150" y="200" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="8" opacity="0.5">SUPPLY</text>
  <path d="M190 170 L190 185 L240 185" fill="none" stroke="#00FF00" stroke-width="1" opacity="0.4"/>
  <text x="215" y="200" text-anchor="middle" fill="#00FF00" font-family="monospace" font-size="8" opacity="0.5">DEMAND</text>
  <!-- Text -->
  <text x="200" y="245" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">TOKENOMICS MODEL</text>
