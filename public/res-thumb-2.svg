<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a0a"/>
      <stop offset="100%" style="stop-color:#2a2a15"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg5)"/>
  <!-- Coin -->
  <circle cx="155" cy="110" r="45" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.7"/>
  <circle cx="155" cy="110" r="35" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <text x="155" y="118" text-anchor="middle" fill="#FFD700" font-family="serif" font-size="30" font-weight="bold" opacity="0.7">T</text>
  <!-- Graph -->
  <polyline points="230,170 250,150 270,155 290,120 310,100 330,85 350,70" fill="none" stroke="#00FF00" stroke-width="2" opacity="0.6"/>
  <line x1="230" y1="170" x2="230" y2="60" stroke="#444" stroke-width="0.5" opacity="0.4"/>
  <line x1="230" y1="170" x2="360" y2="170" stroke="#444" stroke-width="0.5" opacity="0.4"/>
  <!-- Graph dots -->
  <circle cx="250" cy="150" r="3" fill="#00FF00" opacity="0.5"/>
  <circle cx="290" cy="120" r="3" fill="#00FF00" opacity="0.5"/>
  <circle cx="330" cy="85" r="3" fill="#00FF00" opacity="0.5"/>
