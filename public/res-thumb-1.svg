<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg4)"/>
  <!-- L1 Layer -->
  <rect x="100" y="150" width="200" height="30" rx="4" fill="none" stroke="#7B68EE" stroke-width="1.5" opacity="0.6"/>
  <text x="200" y="170" text-anchor="middle" fill="#7B68EE" font-family="monospace" font-size="11" opacity="0.8">LAYER 1</text>
  <!-- L2 Layers -->
  <rect x="110" y="100" width="85" height="30" rx="4" fill="none" stroke="#00BFFF" stroke-width="1.5" opacity="0.7"/>
  <text x="152" y="120" text-anchor="middle" fill="#00BFFF" font-family="monospace" font-size="9" opacity="0.8">ROLLUP</text>
  <rect x="205" y="100" width="85" height="30" rx="4" fill="none" stroke="#00FF00" stroke-width="1.5" opacity="0.7"/>
  <text x="247" y="120" text-anchor="middle" fill="#00FF00" font-family="monospace" font-size="9" opacity="0.8">VALIDIUM</text>
  <!-- L3 -->
  <rect x="130" y="55" width="60" height="25" rx="4" fill="none" stroke="#FF69B4" stroke-width="1" opacity="0.5"/>
  <text x="160" y="72" text-anchor="middle" fill="#FF69B4" font-family="monospace" font-size="8" opacity="0.7">APP CHAIN</text>
  <rect x="210" y="55" width="60" height="25" rx="4" fill="none" stroke="#FF69B4" stroke-width="1" opacity="0.5"/>
  <text x="240" y="72" text-anchor="middle" fill="#FF69B4" font-family="monospace" font-size="8" opacity="0.7">APP CHAIN</text>
  <!-- Connection arrows -->
  <line x1="152" y1="130" x2="170" y2="150" stroke="#00BFFF" stroke-width="0.8" opacity="0.4"/>
  <line x1="247" y1="130" x2="230" y2="150" stroke="#00FF00" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="80" x2="152" y2="100" stroke="#FF69B4" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="80" x2="247" y2="100" stroke="#FF69B4" stroke-width="0.8" opacity="0.3"/>
  <!-- Data flow dots -->
  <circle cx="170" cy="140" r="2" fill="#00BFFF" opacity="0.6"/>
  <circle cx="230" cy="140" r="2" fill="#00FF00" opacity="0.6"/>
  <!-- Text -->
  <text x="200" y="245" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">L2 ECOSYSTEM ANALYSIS</text>
</svg>
